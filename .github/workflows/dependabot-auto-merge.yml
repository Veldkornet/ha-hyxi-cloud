name: Dependabot auto-merge
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: none
  pull-requests: none

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.3.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Verify allowed dependencies
        id: verify
        env:
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        run: |
          ALLOWED_DEPS=("actions/checkout" "actions/dependency-review-action" "actions/download-artifact" "actions/github-script" "actions/labeler" "actions/setup-python" "actions/upload-artifact" "dependabot/fetch-metadata" "github/codeql-action" "gitleaks/gitleaks-action" "google/osv-scanner-action" "hacs/action" "home-assistant/actions" "ossf/scorecard-action" "pre-commit/action" "release-drafter/release-drafter" "softprops/action-gh-release" "step-security/harden-runner" "pytest" "ruff" "pytest-asyncio" "hypothesis" "pytest-homeassistant-custom-component")

          # Dependabot outputs a comma-separated string for grouped updates
          IFS=',' read -r -a DEPS <<< "$DEPENDENCY_NAMES"

          ALLOWED=true
          for DEP in "${DEPS[@]}"; do
            DEP=$(echo "$DEP" | xargs) # trim whitespace

            if ! printf '%s\n' "${ALLOWED_DEPS[@]}" | grep -Fxq "$DEP"; then
              echo "Dependency $DEP is not in the allowlist."
              ALLOWED=false
              # We avoid exiting with a non-zero status here so we don't put a confusing
              # red 'X' (failed CI check) on PRs that simply require a manual review.
              break
            fi
          done

          echo "is_allowed=$ALLOWED" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for Dependabot PRs
        if: >
          steps.metadata.outputs.update-type != 'version-update:semver-major' &&
          steps.verify.outputs.is_allowed == 'true'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
