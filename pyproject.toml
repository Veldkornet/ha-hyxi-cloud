[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ha-hyxi-cloud"
version = "1.2.9"
description = "HYXI ⚡️🔋☀️ Integration for HomeAssistant using HYXI Cloud ☁️"
readme = "README.md"
authors = [
    { name = "Veldkornet" }
]
requires-python = ">=3.13"
dependencies = [
    "aiohttp>=3.13.3",
    "hyxi-cloud-api==0.1.3"
]

[tool.ruff]
target-version = "py314"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (keeps your imports organized)
    "UP",  # pyupgrade (keeps code modern)
    "B",   # flake8-bugbear (catches common bugs)
]
ignore = [
    "E501", # Ignore long lines (often necessary for URLs/Logs)
    "UP039" # This stops Ruff from removing "unnecessary" parentheses
    ] 

[tool.ruff.lint.isort]
force-single-line = true
combine-as-imports = true

[tool.ruff.format]
skip-magic-trailing-comma = false