name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request_target:
    # 🚀 Added 'edited' so renaming a PR updates the draft immediately
    types: [opened, reopened, synchronize, labeled, edited]
concurrency:
  group: release-drafter
  cancel-in-progress: false
permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # We no longer need to checkout the code to find the version!
      # Release Drafter will calculate it based on your labels.
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Update Release Draft
        uses: release-drafter/release-drafter@00ce30b0ce8a4d67bccfca59421cdf6c55dd0784 # v6.3.0
        with:
          commitish: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}