name: Python Tests
permissions:
  contents: read

# This tells GitHub to run this workflow every time you push or make a Pull Request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    # This gives you a fresh Linux machine for the Antigravity/GitHub runner
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' 
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/Veldkornet/hyxi-cloud-api.git
          pip install -r requirements_test.txt
          
      - name: Run Pytest
        run: pytest tests/