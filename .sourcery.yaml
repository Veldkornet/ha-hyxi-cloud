version: '1'

rule_settings:
  enable:
    - default
  disable:
    # Disable any default rules that try to group or modify exception syntax
    # to prevent conflicts with your custom hook and PEP 758.
    - catch-multiple-exceptions

rules:
  - id: enforce-pep-758-exception-grouping
    description: "PEP 758: Always use comma-separated exceptions without parentheses when not using an 'as' clause."
    language: python
    # This matches an except or except* block with parentheses around the exceptions
    patterns:
      - |
        except (${exceptions}):
            ${statements+}
      - |
        except* (${exceptions}):
            ${statements+}
    # Ensure it only flags it if it does not contain the 'as' keyword structurally
    # and is structurally a Tuple of multiple exceptions
    condition: not exceptions.matches_regex(r"\bas\b") and exceptions.node_type == "Tuple"
    explanation: |
      This project enforces the modern PEP 758 standard.
      Multiple exceptions must be comma-separated without surrounding parentheses unless an `as` clause is present.
    tests:
      - match: |
          try:
              pass
          except (ValueError, TypeError):
              pass
      - match: |
          try:
              pass
          except* (ValueError, TypeError):
              pass
      - no-match: |
          try:
              pass
          except ValueError, TypeError:
              pass
      - no-match: |
          try:
              pass
          except (ValueError):
              pass
      - no-match: |
          try:
              pass
          except (ValueError, TypeError) as e:
              pass
      - no-match: |
          try:
              pass
          except factory(ValueError, TypeError):
              pass
