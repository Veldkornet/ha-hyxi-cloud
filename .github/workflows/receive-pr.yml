name: "1. Receive PR (Untrusted)"
permissions:
  contents: read

on:
  pull_request:
    # We use standard pull_request here so it's fully sandboxed
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

jobs:
  gather-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - name: Checkout PR Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Package PR Metadata
        run: |
          mkdir -p pr-metadata
          # Save the PR Number and Commit Hash
          echo ${{ github.event.number }} > pr-metadata/pr_number
          echo ${{ github.event.pull_request.head.sha }} > pr-metadata/pr_sha

          # Copy the labeler config if it exists
          if [ -f .github/labeler.yml ]; then
            cp .github/labeler.yml pr-metadata/
          else
            echo "" > pr-metadata/labeler.yml
          fi

      - name: Upload PR Metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pr-metadata
          path: pr-metadata/
          overwrite: true
