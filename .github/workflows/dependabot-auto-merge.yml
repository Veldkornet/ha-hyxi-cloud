name: Dependabot auto-merge
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: none
  pull-requests: none

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.3.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs
        if: >
          steps.metadata.outputs.update-type != 'version-update:semver-major' &&
          (
            startsWith(steps.metadata.outputs.dependency-names, 'actions/') ||
            startsWith(steps.metadata.outputs.dependency-names, 'github/') ||
            startsWith(steps.metadata.outputs.dependency-names, 'dependabot/') ||
            startsWith(steps.metadata.outputs.dependency-names, 'step-security/') ||
            steps.metadata.outputs.dependency-names == 'pytest' ||
            steps.metadata.outputs.dependency-names == 'ruff'
          )
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
