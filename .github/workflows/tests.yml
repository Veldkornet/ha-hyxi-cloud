name: Python Tests
permissions:
  contents: read

# This tells GitHub to run this workflow every time you push or make a Pull Request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    # This gives you a fresh Linux machine for the Antigravity/GitHub runner
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            fulcio.sigstore.dev:443
            ghcr.io:443
            github.com:443
            objects.githubusercontent.com:443
            open.hyxicloud.com:443
            pypi.org:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            github-releases.s3.amazonaws.com:443
            release-assets.githubusercontent.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -r requirements_test.txt

      - name: Run Unit Tests
        run: pytest tests/ --ignore=tests/integration -v -p no:warnings

      - name: Run Integration Tests
        run: HYXI_INTEGRATION_TEST="1" pytest tests/integration -v -p no:warnings
