name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request_target:
    # 🚀 Added 'edited' so renaming a PR updates the draft immediately
    types: [opened, reopened, synchronize, labeled, edited]

concurrency:
  group: release-drafter
  cancel-in-progress: false

# 🛑 1. Baseline: No permissions allowed by default
permissions:
  contents: none

jobs:
  update_release_draft:
    # ✅ 2. Specifically grant permissions to this job only
    permissions:
      contents: write   # Required to create/update the release draft
      pull-requests: write # Required to read PR labels and metadata
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Update Release Draft
        uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        with:
          committish: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
