name: "Security Shield"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1' # Runs every Monday at 4:30 AM to catch new vulnerabilities

permissions:
  contents: read       # Required to check out code
  security-events: write # Required for Bandit/CodeQL to report to the Security tab
  pull-requests: write   # Optional: Only if you want comments in your PR

jobs:
  # 🛡️ 1. Harden Runner: Blocks exfiltration of your secrets
  # 🔒 2. Gitleaks: Scans for leaked API keys/serial numbers
  # 🐍 3. Bandit: Scans for Python-specific security holes
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Allows Bandit/Gitleaks to report to the Security tab

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc #v2.15.1
        with:
          # 👇 Change to 'audit' for the first few runs!
          # You need to see the 'Allowed Endpoints' list before you can safely 'block'.
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pypi.org:443
            files.pythonhosted.org:443
            api.securityscorecards.dev:443
            api.stepsecurity.io:443

      - name: Checkout Code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks (Secret Scan)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bandit (Python Security)
        run: |
          # 👇 You must install 'sarif' support for bandit to generate the file
          pip install "bandit[sarif]"
          # 👇 Added -f sarif and -o to actually CREATE the file for the next step
          bandit -r custom_components/hyxi_cloud/ -ll -f sarif -o bandit-results.sarif

      - name: Upload Bandit Results
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        if: always() # Ensures results upload even if Bandit finds a 'Failed' security hole
        with:
          sarif_file: bandit-results.sarif

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to submit the snapshot
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2
      - name: Submit Dependencies
        uses: actions/python-dependency-submission-action@e4b0100d986503c5d6e2c38290f64c672b152d1b # v4.3.0

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # 👇 IMPORTANT: Harden-Runner must be the FIRST step in EVERY job
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc #v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2
      - name: Review Dependencies
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 #v4.9.0
