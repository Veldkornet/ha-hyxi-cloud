name: "Security Shield"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'

permissions:
  contents: read
  security-events: write 

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          # 👇 Change this back to 'audit' for the first few runs! 
          # You need to see the 'Allowed Endpoints' list before you can safely 'block'.
          egress-policy: block 
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pypi.org:443
            files.pythonhosted.org:443
            api.stepsecurity.io:443

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks (Secret Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bandit (Python Security)
        run: |
          # 👇 You must install 'sarif' support for bandit to generate the file
          pip install "bandit[sarif]"
          # 👇 Added -f sarif and -o to actually CREATE the file for the next step
          bandit -r custom_components/hyxi_cloud/ -ll -f sarif -o bandit-results.sarif

      - name: Upload Bandit Results
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Ensures results upload even if Bandit finds a 'Failed' security hole
        with:
          sarif_file: bandit-results.sarif

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # 👇 IMPORTANT: Harden-Runner must be the FIRST step in EVERY job
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
      - name: Review Dependencies
        uses: actions/dependency-review-action@v4