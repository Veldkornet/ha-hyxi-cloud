name: Release Publisher

on:
  release:
    types: [published]

# 🛑 1. Start with zero permissions at the top level
permissions:
  contents: none

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    # ✅ 2. Explicitly grant 'write' ONLY for this specific release task
    permissions:
      contents: write # To read the code and upload the asset

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: 📥 Checkout Code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2

      - name: 📝 Inject Version into Manifest
        run: |
          # Grab the release tag (e.g., v1.3.0) and strip the 'v'
          TAG_NAME="${{ github.event.release.tag_name }}"
          CLEAN_VERSION="${TAG_NAME#v}"

          echo "Injecting version $CLEAN_VERSION into manifest..."
          jq ".version = \"$CLEAN_VERSION\"" custom_components/hyxi_cloud/manifest.json > tmp.json
          mv tmp.json custom_components/hyxi_cloud/manifest.json

      - name: 📦 Create Zip Archive
        run: |
          # Go INSIDE the integration folder and zip the contents
          # This ensures manifest.json is at the root of the zip file
          cd custom_components/hyxi_cloud
          zip -r ../../hyxi_cloud.zip .
          cd ../..

      - name: 🚀 Upload Zip to Release
        uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a # v2.5.3
        with:
          files: hyxi_cloud.zip
          tag_name: ${{ github.event.release.tag_name }}
          overwrite: true
