name: Python Tests
permissions:
  contents: read

# This tells GitHub to run this workflow every time you push or make a Pull Request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    # This gives you a fresh Linux machine for the Antigravity/GitHub runner
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
      
      - name: Set up Python 3.14
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.5.0
        with:
          python-version: '3.14' 
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/Veldkornet/hyxi-cloud-api.git
          pip install -r requirements_test.txt
          
      - name: Run Pytest
        run: pytest tests/ -v -p no:warnings