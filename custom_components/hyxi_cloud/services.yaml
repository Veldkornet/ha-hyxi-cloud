cancel_subscription:
  name: Cancel Subscription
  description: Manually cancel an active or orphaned push/alarm subscription on the HYXI Cloud server.
  fields:
    subscribe_code:
      name: Subscription Code
      description: The subscription code/ID (e.g. from ".storage/core.config_entries" or ".storage/hyxi_cloud_subscriptions").
      example: "A1B2C3D4E5F6G7H8I9J0K1L2M3N4O5P6"
      required: true
      selector:
        text:
